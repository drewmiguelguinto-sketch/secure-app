name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: .semgrep.yml

      - name: Dependency Scan
        uses: pyupio/safety-action@v1
        with:
          requirements: requirements.txt

      - name: Secret Scan
        uses: trufflesecurity/trufflehog-actions-scan@v1

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: security-scans
          path: ./semgrep-results.json

  build:
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t secure-app:${{ github.sha }} .

      - name: Generate SBOM
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            anchore/syft:latest \
            secure-app:${{ github.sha }} -o cyclonedx-json > sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Container Scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image secure-app:${{ github.sha }} > trivy-report.txt

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        with:
          name: vuln-report
          path: trivy-report.txt

      - name: Mark trusted build
        run: echo "Trusted build: secure-app:${{ github.sha }}" > trusted-build.txt

      - name: Upload trusted build marker
        uses: actions/upload-artifact@v4
        with:
          name: trusted-build
          path: trusted-build.txt
